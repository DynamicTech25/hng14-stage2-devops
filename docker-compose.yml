services:

  redis:
    image: redis:7
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY:-256m}

  api:
    build: ./api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_URL: ${API_URL:-http://localhost:8000}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: always

    # ✅ FIX: ADD HEALTHCHECK (this is what you're missing)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: ${API_MEMORY:-512m}

  worker:
    build: ./worker
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY:-256m}

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_URL: ${API_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEMORY:-256m}

networks:
  app-network:
    name: app-network

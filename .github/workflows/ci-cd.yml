name: HNG Stage 2 CI/CD Pipeline (Production Ready)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # =========================
  # 1. LINT STAGE
  # =========================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker --exclude=venv,env,__pycache__,.venv

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      # ✅ FIXED HADOLINT STEP
      - name: Lint Dockerfiles
        run: hadolint --ignore DL3008 --ignore DL3018 api/Dockerfile worker/Dockerfile
          frontend/Dockerfile

  # =========================
  # 2. TEST STAGE
  # =========================
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fastapi httpx redis

      - name: Run tests with coverage
        run: |
          export PYTHONPATH=.
          pytest api/tests --cov=api --cov-report=xml -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # =========================
  # 3. BUILD STAGE
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/hng-api:${{ github.sha }} ./api
          docker push localhost:5000/hng-api:${{ github.sha }}

      - name: Build and push Worker image
        run: |
          docker build -t localhost:5000/hng-worker:${{ github.sha }} ./worker
          docker push localhost:5000/hng-worker:${{ github.sha }}

      - name: Build and push Frontend image
        run: |
          docker build -t localhost:5000/hng-frontend:${{ github.sha }} ./frontend
          docker push localhost:5000/hng-frontend:${{ github.sha }}

  # =========================
  # 4. SECURITY SCAN
  # =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t hng-api:scan ./api

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        run: trivy image --severity CRITICAL --exit-code 1 hng-api:scan

      - name: Upload SARIF artifact
        if: always ()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results/

  # =========================
  # 5. INTEGRATION TEST
  # =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Debug containers
        run: |
          docker compose ps
          docker compose logs frontend
          docker compose logs api

      - name: Wait for API
        run: |
          echo "Waiting for API..."

          for i in {1..30}; do
            if curl -fs http://127.0.0.1:8000/ >/dev/null; then
              echo "API is ready"
              exit 0
            fi

            echo "waiting..."
            sleep 2
          done

          echo "API failed"
          docker compose logs api
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
          if curl -fs http://127.0.0.1:3000 >/dev/null; then
          echo "Frontend ready"
          break
          fi
          echo "waiting for frontend..."
          sleep 2
          done

      - name: Submit job
        run: |
          curl -v -X POST http://127.0.0.1:3000/submit

      - name: Poll job result
        run: |
          sleep 5
          curl http://127.0.0.1:3000/status/1

      - name: Teardown stack
        if: always()
        run: docker compose down

  # =========================
  # 6. DEPLOY
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy stack
        run: docker compose up -d --build

      - name: Health check
        run: |
          echo "Checking deployment..."

          for i in {1..20}; do
            if curl -fs http://127.0.0.1:8000/ >/dev/null; then
              echo "Deployment successful"
              exit 0
            fi
            sleep 3
          done

          echo "Deployment failed"
          docker compose logs api
          exit 1

      - name: Cleanup old containers
        run: docker compose down

      - name: Success message
        run: echo "Deployment completed successfully"

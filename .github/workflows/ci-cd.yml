name: HNG Stage 2 CI/CD Pipeline (Production Ready)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

# =========================
# 1. LINT STAGE
# =========================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint backend
        run: flake8 api worker

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Lint frontend
        run: |
          cd frontend
          npx eslint . || true


# =========================
# 2. TEST STAGE (WITH REDIS + COVERAGE)
# =========================
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest fastapi httpx redis pytest-cov

      - name: Run tests with coverage
        run: |
          pytest api -v --cov=api --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# =========================
# 3. BUILD STAGE
# =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t hng-api:${{ github.sha }} ./api
          docker tag hng-api:${{ github.sha }} hng-api:latest

      - name: Build Worker image
        run: |
          docker build -t hng-worker:${{ github.sha }} ./worker
          docker tag hng-worker:${{ github.sha }} hng-worker:latest

      - name: Build Frontend image
        run: |
          docker build -t hng-frontend:${{ github.sha }} ./frontend
          docker tag hng-frontend:${{ github.sha }} hng-frontend:latest


# =========================
# 4. SECURITY SCAN (FIXED TRIVY)
# =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t hng-api:scan ./api

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        run: trivy image --severity CRITICAL --format sarif --output trivy.sarif hng-api:scan

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif


# =========================
# 5. INTEGRATION TEST (FULL STACK)
# =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..15}; do
            curl -s http://localhost:8000/ && exit 0 || sleep 3
          done
          exit 1

      - name: Create job test
        run: curl -X POST http://localhost:8000/jobs

      - name: Health check
        run: curl --fail http://localhost:8000/


# =========================
# 6. DEPLOY (ROLLING UPDATE SIMULATION)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Start old stack
        run: docker compose up -d

      - name: Build new version
        run: docker compose up -d --build

      - name: Wait for health check (60s max)
        run: |
          for i in {1..20}; do
            curl -s http://localhost:8000/ && exit 0 || sleep 3
          done
          echo "Health check failed" && exit 1

      - name: Shutdown old containers
        run: docker compose down || true

      - name: Deployment success
        run: echo "Rolling update successful ✔"
name: HNG Stage 2 CI/CD Pipeline (Production Ready)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  TAG_SHA: ${{ github.sha }}

jobs:

  # =========================
  # 1. LINT STAGE
  # =========================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8
      - run: flake8 api worker --exclude=venv,env,__pycache__,.venv

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          cd frontend
          npm install
          npx eslint . || true

      - run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - run: |
          hadolint --ignore DL3008 --ignore DL3018 \
            api/Dockerfile worker/Dockerfile frontend/Dockerfile

  # =========================
  # 2. TEST STAGE
  # =========================
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fastapi httpx redis

      - run: |
          export PYTHONPATH=.
          pytest api/tests --cov=api --cov-report=xml -v

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # =========================
  # 3. BUILD STAGE (LOCAL TAGGING ONLY)
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # API
      - name: Build API
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t hng-api:${TAG_SHA} \
            -t hng-api:latest \
            ./api

      # WORKER
      - name: Build Worker
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t hng-worker:${TAG_SHA} \
            -t hng-worker:latest \
            ./worker

      # FRONTEND
      - name: Build Frontend
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t hng-frontend:${TAG_SHA} \
            -t hng-frontend:latest \
            ./frontend

  # =========================
  # 4. SECURITY SCAN
  # =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t hng-api:scan ./api

      - run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

      - run: |
          trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            --format sarif \
            -o trivy-results.sarif \
            hng-api:scan

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

  # =========================
  # 5. INTEGRATION TEST
  # =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      # FIX: ensure env exists for compose
      - name: Create CI env file
        run: cp .env.example .env

      - run: docker compose up -d --build

      - run: |
          for i in {1..30}; do
            curl -fs http://127.0.0.1:8000/ && exit 0
            sleep 2
          done
          docker compose logs api
          exit 1

      - run: docker compose down

  # =========================
  # 6. DEPLOY (SIMULATED ROLLING UPDATE)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling update API
        run: docker compose up -d --no-deps api

      - name: Rolling update Worker
        run: docker compose up -d --no-deps worker

      - name: Rolling update Frontend
        run: docker compose up -d --no-deps frontend

      - name: Health check
        run: |
          for i in {1..20}; do
            curl -fs http://127.0.0.1:8000/ && exit 0
            sleep 3
          done
          docker compose logs api
          exit 1

      - run: docker compose down

      - run: echo "Deployment completed successfully"

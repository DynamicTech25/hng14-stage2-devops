name: HNG Stage 2 CI/CD Pipeline (Production Ready)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # =========================
  # 1. LINT STAGE
  # =========================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile

  # =========================
  # 2. TEST STAGE
  # =========================
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fastapi httpx redis

      - name: Run tests with coverage
        run: pytest api --cov=api --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # =========================
  # 3. BUILD STAGE (WITH LOCAL REGISTRY)
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/hng-api:${{ github.sha }} ./api
          docker tag localhost:5000/hng-api:${{ github.sha }} localhost:5000/hng-api:latest
          docker push localhost:5000/hng-api:${{ github.sha }}
          docker push localhost:5000/hng-api:latest

      - name: Build and push Worker image
        run: |
          docker build -t localhost:5000/hng-worker:${{ github.sha }} ./worker
          docker tag localhost:5000/hng-worker:${{ github.sha }} localhost:5000/hng-worker:latest
          docker push localhost:5000/hng-worker:${{ github.sha }}
          docker push localhost:5000/hng-worker:latest

      - name: Build and push Frontend image
        run: |
          docker build -t localhost:5000/hng-frontend:${{ github.sha }} ./frontend
          docker tag localhost:5000/hng-frontend:${{ github.sha }} localhost:5000/hng-frontend:latest
          docker push localhost:5000/hng-frontend:${{ github.sha }}
          docker push localhost:5000/hng-frontend:latest

  # =========================
  # 4. SECURITY SCAN
  # =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image for scan
        run: docker build -t hng-api:scan ./api

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        run: trivy image --severity CRITICAL --exit-code 1 --format sarif --output
          trivy.sarif hng-api:scan

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

  # =========================
  # 5. INTEGRATION TEST
  # =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000 && exit 0
            echo "waiting for api..."
            sleep 2
          done

          exit 1

      - name: Submit job
        run: curl -X POST http://localhost:3000/submit

      - name: Poll job result
        run: |
          sleep 5
          curl http://localhost:3000/status/1

      - name: Teardown stack
        if: always()
        run: docker compose down

  # =========================
  # 6. DEPLOY
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start old version
        run: docker compose up -d

      - name: Deploy new version
        run: docker compose up -d --build

      - name: Health check (60s max)
        run: |
          for i in {1..20}; do
            curl -s http://localhost:8000 && exit 0 || sleep 3
          done
          echo "Deployment failed"
          exit 1

      - name: Stop old containers
        run: docker compose down

      - name: Deployment success
        run: echo "Deployment completed successfully"
